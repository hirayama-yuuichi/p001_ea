AWSTemplateFormatVersion: '2010-09-09'
Description: 'EC2 Windows Server 2022 for MT5 and Claude Code'

Parameters:
  InstanceType:
    Type: String
    Default: t3.medium
    Description: EC2 Instance Type
    AllowedValues:
      - t3.medium
      - t3.large
      - t3.xlarge

  VolumeSize:
    Type: Number
    Default: 100
    Description: EBS Volume Size (GB)
    MinValue: 50
    MaxValue: 1000

  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: EC2 KeyPair Name (must be pre-generated)

Resources:
  # Security Group
  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: RDP and SSH access
      SecurityGroupIngress:
        # RDP (3389)
        - IpProtocol: tcp
          FromPort: 3389
          ToPort: 3389
          CidrIp: 0.0.0.0/0
          Description: RDP from anywhere
        # SSH (22)
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
          Description: SSH from anywhere
      Tags:
        - Key: Name
          Value: p001-ea-sg

  # IAM ロール（SSM Session Manager + CloudWatch Logs 用）
  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2Role

  # EC2 インスタンス
  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Sub '{{resolve:ssm:/aws/service/ami-windows-latest/Windows_Server-2022-English-Core-Base:1}}'
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      SecurityGroupIds:
        - !Ref EC2SecurityGroup
      IamInstanceProfile: !Ref EC2InstanceProfile
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: !Ref VolumeSize
            VolumeType: gp3
            DeleteOnTermination: true
      UserData:
        Fn::Base64: !Sub |
          <powershell>
          # ロギング
          $logPath = "C:\cfn-init.log"
          Start-Transcript -Path $logPath -Append

          # Chocolatey インストール
          Write-Host "Installing Chocolatey..."
          Set-ExecutionPolicy Bypass -Scope Process -Force
          [System.Net.ServicePointManager]::SecurityProtocol = 3072
          iex ((New-Object Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'))

          # Git インストール
          Write-Host "Installing Git..."
          choco install git -y

          # Python インストール
          Write-Host "Installing Python..."
          choco install python -y

          # OpenSSH サーバー インストール・起動
          Write-Host "Installing OpenSSH..."
          Add-WindowsCapability -Online -Name OpenSSH.Server~~~~0.0.1.0
          Start-Service sshd
          Set-Service -Name sshd -StartupType Automatic

          # 自動シャットダウンスケジュール（起動後 4 時間）
          Write-Host "Setting up auto-shutdown after 4 hours..."
          $shutdownTime = (Get-Date).AddHours(4)
          $scheduleParams = @{
              TaskName    = "AutoShutdown"
              Action      = (New-ScheduledTaskAction -Execute "shutdown.exe" -Argument "/s /f /t 60")
              Trigger     = (New-ScheduledTaskTrigger -Once -At $shutdownTime)
              RunLevel    = "Highest"
          }
          Register-ScheduledTask @scheduleParams -Force

          Write-Host "CloudFormation initialization completed"
          Stop-Transcript
          </powershell>
      Tags:
        - Key: Name
          Value: p001-ea-ec2-windows
        - Key: Project
          Value: p001_ea

Outputs:
  InstanceId:
    Description: EC2 Instance ID
    Value: !Ref EC2Instance

  PublicIP:
    Description: Public IP Address
    Value: !GetAtt EC2Instance.PublicIp

  PrivateIP:
    Description: Private IP Address
    Value: !GetAtt EC2Instance.PrivateIp

  RDPCommand:
    Description: RDP Connection Command
    Value: !Sub 'mstsc /v:${EC2Instance.PublicIp}'

  SSHCommand:
    Description: SSH Connection Command (replace your-key.pem)
    Value: !Sub 'ssh -i your-key.pem Administrator@${EC2Instance.PublicIp}'

  SecurityGroupId:
    Description: Security Group ID
    Value: !Ref EC2SecurityGroup
